services:
  postgres:
    image: postgres:17-alpine
    container_name: docapp-postgres
    environment:
      POSTGRES_USER: docapp
      POSTGRES_PASSWORD: docapp_secret_2026
      POSTGRES_DB: documents_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    expose:
      - 5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docapp"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - docapp-net

  minio:
    image: minio/minio:latest
    container_name: docapp-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin_secret_2026
    volumes:
      - minio_data:/data
    expose:
      - 9000
      - 9001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - docapp-net

  backend:
    build: .
    image: docapp-backend:latest
    container_name: docapp-backend
    environment:
      SERVICE_PORT: 8000
      DB_USER: docapp
      DB_PASSWORD: docapp_secret_2026
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: documents_db
      MINIO_HOST: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin_secret_2026
      MINIO_BUCKET: documents
      MINIO_URL: http://minio:9000
    ports:
      - "9000:8000"
    depends_on:
      postgres:
        condition: service_started
      minio:
        condition: service_started
    restart: unless-stopped
    networks:
      - docapp-net

volumes:
  pgdata:
  minio_data:

networks:
  docapp-net:
    driver: bridge
