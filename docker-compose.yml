services:
  postgres:
    image: postgres:17-alpine
    container_name: docapp-postgres
    environment:
      POSTGRES_USER: docapp
      POSTGRES_PASSWORD: docapp_secret_2026
      POSTGRES_DB: documents_db
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    expose:
      - 5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docapp"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - docapp-net

  minio:
    image: minio/minio:latest
    container_name: docapp-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin_secret_2026
    volumes:
      - minio_data:/data
    expose:
      - 9000
      - 9001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - docapp-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: docapp-backend:latest
    container_name: docapp-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://docapp:docapp_secret_2026@postgres:5432/documents_db
      MINIO_HOST: minio
      MINIO_PORT: 9000
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin_secret_2026
      MINIO_BUCKET: documents
      MINIO_URL: http://minio:9000
      UPLOAD_MAX_SIZE: "52428800"
    depends_on:
      postgres:
        condition: service_started
      minio:
        condition: service_started
    expose:
      - 8000
    restart: unless-stopped
    networks:
      - docapp-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: docapp-frontend:latest
    container_name: docapp-frontend
    depends_on:
      - backend
    ports:
      - "9000:80"
    restart: unless-stopped
    networks:
      - docapp-net

volumes:
  pgdata:
  minio_data:

networks:
  docapp-net:
    driver: bridge
